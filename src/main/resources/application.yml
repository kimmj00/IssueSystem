spring:
  application:
    name: issue-system

  datasource:
    url: jdbc:postgresql://localhost:5432/issue_system
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 50 # Hibernate가 insert를 일정 개수씩 묶어서 처리하도록 설정
        order_inserts: true # 같은 종류의 insert를 모아서 실행
        order_updates: true # update도 정렬해서 실행
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

logging:
  level:
    org.hibernate.SQL: debug

app:
  file:
    upload-dir: D:/issue_system/uploads


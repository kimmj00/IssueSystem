---
spring:
  config:
    activate:
      on-profile: supabase

  spring:
    datasource:
      url: ${SPRING_DATASOURCE_URL}
      username: ${SPRING_DATASOURCE_USERNAME}
      password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 50 # Hibernate가 insert를 일정 개수씩 묶어서 처리하도록 설정
        order_inserts: true # 같은 종류의 insert를 모아서 실행
        order_updates: true # update도 정렬해서 실행
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

logging:
  level:
    org.hibernate.SQL: info

app:
  file:
    upload-dir: /tmp/issue_system/uploads # Render 무료 서버용 임시 업로드 경로